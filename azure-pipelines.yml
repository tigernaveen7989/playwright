trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md
      - docs/*

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md
      - docs/*

schedules:
- cron: "0 2 * * *"
  displayName: Daily midnight build
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '20.x'

stages:
- stage: Test
  displayName: 'Run Playwright Tests'
  jobs:
  - job: PlaywrightTests
    displayName: 'Playwright Test Suite'
    strategy:
      matrix:
        CallCenter:
          projectName: 'call-center'
        XmlApi:
          projectName: 'xml-api'
        JsonApi:
          projectName: 'json-api'
    
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '$(nodeVersion)'
      displayName: 'Install Node.js'

    - script: npm ci
      displayName: 'Install dependencies'

    - script: npx playwright install --with-deps
      condition: eq(variables['projectName'], 'call-center')
      displayName: 'Install Playwright browsers'

    - script: npm run test -- --project=$(projectName)
      displayName: 'Run $(projectName) tests'
      env:
        ENVIRONMENT: $(ENVIRONMENT)
        SUBENVIRONMENT: $(SUBENVIRONMENT)
        TENANT: $(TENANT)

    - task: PublishTestResults@2
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'test-results/junit.xml'
        testRunTitle: '$(projectName) Test Results'

    - task: PublishHtmlReport@1
      condition: succeededOrFailed()
      inputs:
        reportDir: 'playwright-report'
        tabName: 'Playwright Report - $(projectName)'

    - task: PublishBuildArtifacts@1
      condition: succeededOrFailed()
      inputs:
        pathToPublish: 'allure-results'
        artifactName: 'allure-results-$(projectName)'

- stage: GenerateReport
  displayName: 'Generate Allure Report'
  dependsOn: Test
  condition: always()
  jobs:
  - job: AllureReport
    displayName: 'Generate Allure Report'
    
    steps:
    - task: DownloadBuildArtifacts@0
      inputs:
        downloadType: 'specific'
        itemPattern: 'allure-results-*/**'
        downloadPath: '$(System.ArtifactsDirectory)'

    - script: |
        npm install -g allure-commandline
        mkdir -p allure-results
        cp -r $(System.ArtifactsDirectory)/allure-results-*/* allure-results/
        allure generate allure-results --clean -o allure-report
      displayName: 'Generate Allure report'

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: 'allure-report'
        artifactName: 'allure-report'