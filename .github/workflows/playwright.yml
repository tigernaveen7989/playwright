name: copilot code review

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - master
      - develop

jobs:
  code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      PR_AUTHOR_EMAIL_MAP: ${{ vars.PR_AUTHOR_EMAIL_MAP }}

    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Dependencies
        run: npm ci

      - name: Get Changed Files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100
              }
            );

            fs.writeFileSync(
              'changed-files.txt',
              files.map(f => f.filename).join('\n') + '\n',
              'utf8'
            );

      - name: Build Project
        run: npm run build
        continue-on-error: true

      - name: Run Code Review Agent
        run: |
          node .github/workflows/code-reviewer-agent.js

      - name: Load Email Config from environment.env
        id: load-email-config
        shell: bash
        run: |
          ENV_FILE="environment.env"

          read_env() {
            local key="$1"
            local value
            value=$(grep -E "^${key}[[:space:]]*=" "$ENV_FILE" | tail -n 1 | sed -E "s/^${key}[[:space:]]*=[[:space:]]*//" | tr -d '\r')
            echo "$value"
          }

          SMTP_SERVER="$(read_env EMAIL_HOST)"
          SMTP_PORT="$(read_env EMAIL_PORT)"
          EMAIL_FROM="$(read_env EMAIL_FROM)"
          DEFAULT_TO="$(read_env EMAIL_TO)"

          if [ "$SMTP_PORT" = "465" ]; then
            SMTP_SECURE="true"
          else
            SMTP_SECURE="false"
          fi

          echo "smtp_server=$SMTP_SERVER" >> "$GITHUB_OUTPUT"
          echo "smtp_port=$SMTP_PORT" >> "$GITHUB_OUTPUT"
          echo "smtp_secure=$SMTP_SECURE" >> "$GITHUB_OUTPUT"
          echo "email_from=$EMAIL_FROM" >> "$GITHUB_OUTPUT"
          echo "default_to=$DEFAULT_TO" >> "$GITHUB_OUTPUT"

          echo "SMTP_SERVER=$SMTP_SERVER" >> "$GITHUB_ENV"
          echo "SMTP_PORT=$SMTP_PORT" >> "$GITHUB_ENV"
          echo "SMTP_SECURE=$SMTP_SECURE" >> "$GITHUB_ENV"
          echo "EMAIL_FROM=$EMAIL_FROM" >> "$GITHUB_ENV"
          echo "DEFAULT_TO=$DEFAULT_TO" >> "$GITHUB_ENV"

      - name: Resolve PR Author Email
        id: pr-author-email
        uses: actions/github-script@v7
        env:
          DEFAULT_TO: ${{ steps.load-email-config.outputs.default_to }}
        with:
          script: |
            const user = context.payload.pull_request?.user || {};
            const login = user.login || '';
            const userId = user.id || '';
            const directEmail = user.email || '';
            const defaultTo = process.env.DEFAULT_TO || '';
            const emailMapRaw = process.env.PR_AUTHOR_EMAIL_MAP || '{}';
            let commitAuthorEmail = '';

            let emailMap = {};
            try {
              emailMap = JSON.parse(emailMapRaw);
            } catch (error) {
              console.log(`PR_AUTHOR_EMAIL_MAP is not valid JSON: ${error.message}`);
            }

            try {
              const commits = await github.paginate(
                github.rest.pulls.listCommits,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  per_page: 100
                }
              );

              const prAuthorCommit = commits.find((commit) => commit.author?.login === login);
              const candidateEmail = prAuthorCommit?.commit?.author?.email || '';
              if (candidateEmail && !candidateEmail.endsWith('@users.noreply.github.com')) {
                commitAuthorEmail = candidateEmail;
              }
            } catch (error) {
              console.log(`Unable to read PR commits for email resolution: ${error.message}`);
            }

            const mappedEmail = login ? (emailMap[login] || emailMap[login.toLowerCase()] || '') : '';
            const fallbackNoReply = login && userId ? `${userId}+${login}@users.noreply.github.com` : '';
            const recipient = directEmail || commitAuthorEmail || mappedEmail || fallbackNoReply || defaultTo;

            core.setOutput('recipient', recipient);
            core.setOutput('login', login);

            console.log(`PR author login: ${login}`);
            console.log(`Recipient resolved: ${recipient || 'none'}`);

      - name: Prepare Review Report Email Body
        id: review-email-body
        if: always()
        run: |
          if [ -f review-report.md ]; then
            cp review-report.md review-report-email.md
          else
            echo "## AI Code Review Report" > review-report-email.md
            echo "" >> review-report-email.md
            echo "review-report.md not found. Please check workflow logs." >> review-report-email.md
          fi

      - name: Send Review Report Email
        if: always() && steps.pr-author-email.outputs.recipient != '' && steps.load-email-config.outputs.smtp_server != '' && steps.load-email-config.outputs.email_from != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ steps.load-email-config.outputs.smtp_server }}
          server_port: ${{ steps.load-email-config.outputs.smtp_port != '' && steps.load-email-config.outputs.smtp_port || '25' }}
          secure: ${{ steps.load-email-config.outputs.smtp_secure != '' && steps.load-email-config.outputs.smtp_secure || 'false' }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "AI Code Review Report - PR #${{ github.event.pull_request.number }}"
          to: ${{ steps.pr-author-email.outputs.recipient }}
          from: ${{ steps.load-email-config.outputs.email_from }}
          body: file://review-report-email.md
          convert_markdown: true
          attachments: review-report.md

      - name: Email Delivery Status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const recipient = '${{ steps.pr-author-email.outputs.recipient }}';
            const hasSmtp = Boolean('${{ steps.load-email-config.outputs.smtp_server }}' && '${{ steps.load-email-config.outputs.email_from }}' && recipient);

            if (!recipient) {
              console.log('Email skipped: PR author email could not be resolved and EMAIL_TO fallback is empty.');
              return;
            }

            if (!hasSmtp) {
              console.log('Email skipped: EMAIL_HOST or EMAIL_FROM missing in environment.env.');
              return;
            }

            console.log(`Email step executed for recipient: ${recipient}`);

      - name: Comment Review Findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ai-code-review-report -->';

            if (!fs.existsSync('review-report.md')) {
              console.log('review-report.md not found.');
              return;
            }

            const report = fs.readFileSync('review-report.md', 'utf8').trim();

            if (!report) {
              console.log('Review report is empty.');
              return;
            }

            const maxLen = 60000;

            const safeReport =
              report.length > maxLen
                ? `${report.slice(0, maxLen)}\n\n...truncated due to GitHub comment limits.`
                : report;

            const body = `${marker}\n${safeReport}`;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100
              }
            );

            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' &&
              typeof comment.body === 'string' &&
              comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });

              console.log(`Updated existing review comment: ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });

              console.log('Created new review comment.');
            }