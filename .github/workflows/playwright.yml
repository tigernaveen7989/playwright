name: copilot code review

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - master
      - develop

jobs:
  code-review:
    name: AI Code Review
    runs-on: copilot-review-s
    timeout-minutes: 30

    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Dependencies
        run: npm ci

      - name: Get Changed Files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100
              }
            );

            fs.writeFileSync(
              'changed-files.txt',
              files.map(f => f.filename).join('\n') + '\n',
              'utf8'
            );

      - name: Build Project
        run: npm run build
        continue-on-error: true

      - name: Run Code Review Agent
        run: |
          node .github/workflows/code-reviewer-agent.js

      - name: Comment Review Findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ai-code-review-report -->';

            if (!fs.existsSync('review-report.md')) {
              console.log('review-report.md not found.');
              return;
            }

            const report = fs.readFileSync('review-report.md', 'utf8').trim();

            if (!report) {
              console.log('Review report is empty.');
              return;
            }

            const maxLen = 60000;

            const safeReport =
              report.length > maxLen
                ? `${report.slice(0, maxLen)}\n\n...truncated due to GitHub comment limits.`
                : report;

            const body = `${marker}\n${safeReport}`;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100
              }
            );

            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' &&
              typeof comment.body === 'string' &&
              comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });

              console.log(`Updated existing review comment: ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });

              console.log('Created new review comment.');
            }